<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>eSpace Dev Hub — Companion</title>
    <!--
      Strict CSP: scripts only from our own bundle, no inline. The one
      relaxation is style-src/font-src for Google Fonts, so the renderer
      can load the same Doto/Hanken Grotesk/Space Mono trio as the web
      app — same origins apps/web already trusts. Phase 4 will tighten
      further once we ship a real packaged build; in dev we relax to
      allow Vite's HMR client.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' ws://localhost:5173 http://localhost:5173"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Doto:wght@400;500;700;900&family=Space+Mono:wght@400;700&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap"
    />
    <style>
      /* Nothing UI dark tokens — same values as apps/web's
         [data-theme="dark"] block in src/app/globals.css. The companion
         is dark-only (system tray app, no theme toggle), so these live
         directly on :root rather than behind a data-theme selector. */
      :root {
        color-scheme: dark;
        --bg: #050505;
        --fg: #f5f5f5;
        --card: #101010;
        --card-alt: #161616;
        --panel: #0d0d0d;
        --panel-2: #1c1c1c;
        --muted-fg: rgba(245, 245, 245, 0.55);
        --dim-fg: rgba(245, 245, 245, 0.34);
        --border: rgba(255, 255, 255, 0.10);
        --border-strong: rgba(255, 255, 255, 0.20);
        --accent: #4d7cff;
        --accent-on: #ffffff;
        --accent-dim: rgba(77, 124, 255, 0.18);
        --good: #3fcf8e;
        --warn: #ffb24d;
        --bad: #ff5a5a;
        --dot-dim: rgba(255, 255, 255, 0.16);
        --radius-tile: 8px;
        --radius-sub: 6px;
        --radius-pill: 999px;
        --font-sans: "Hanken Grotesk", system-ui, -apple-system, sans-serif;
        --font-mono: "Space Mono", ui-monospace, "SF Mono", Menlo, monospace;
        --font-dot: "Doto", "Space Mono", monospace;
        font-family: var(--font-sans);
      }
      html, body, #root { height: 100%; margin: 0; }
      body {
        background: var(--bg);
        color: var(--fg);
        background-image: radial-gradient(var(--dot-dim) 1px, transparent 1px);
        background-size: 13px 13px;
      }
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }
      @keyframes companion-spin { to { transform: rotate(360deg); } }
      .companion-spinner {
        display: inline-block;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        border: 2px solid var(--border-strong);
        border-top-color: var(--accent);
        animation: companion-spin 0.7s linear infinite;
        flex: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
