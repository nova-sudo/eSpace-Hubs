# Local development services for the eSpace Dev Hub API.
#
# Usage:
#   docker compose up -d                       # core (mongo + api)
#   docker compose --profile api up -d         # api only (uses external Mongo, e.g. Atlas)
#   docker compose --profile tunnel up -d      # core + Cloudflare Tunnel (public hostname)
#   docker compose --profile future up -d      # + redis (reserved for M4+)
#   docker compose --profile qa up -d          # + jenkins (QA Hub dev)
#   docker compose down                        # stop (data persists)
#   docker compose down -v                     # stop + wipe ALL data
#
# The `api` service is what makes this useful from a public Vercel
# frontend — when paired with the `tunnel` profile, Vercel's
# `API_ORIGIN` env points at the public tunnel hostname and /api/v1/*
# proxies through to this container. Lets you run the backend on any
# host with the right network access (e.g. a laptop on Crealogix VPN
# that can resolve `git.bcn.crealogix.net`).
#
# Mongo lives at mongodb://localhost:27017/devhub-dev (configured in
# apps/api/.env.local). Redis + Jenkins ride on `profiles:` flags so
# they don't auto-start on a vanilla `docker compose up -d` — they're
# only relevant when actively developing the features that consume
# them.

services:
  mongo:
    image: mongo:7
    container_name: devhub-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      # No auth in dev — the connection URI in apps/api/.env.local matches.
      # Production deploys use a managed Atlas cluster with SCRAM auth.
      MONGO_INITDB_DATABASE: devhub-dev
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    # The eSpace Dev Hub Express API. Same code as the Vercel
    # serverless catch-all (apps/web/src/pages/api/v1/[...path].ts),
    # just running as a long-lived Node process inside this container.
    #
    # Why a separate "api" profile is NOT enabled here: most local
    # dev wants the api running alongside Mongo, so it's always-on by
    # default. If you only want the api against an EXTERNAL Mongo
    # (e.g. Atlas), stop the mongo service: `docker compose stop mongo`.
    container_name: espace-devhub-api
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      # Localhost-bound by default. Use the tunnel for external
      # access; if you need LAN access without a tunnel, change to
      # "0.0.0.0:4000:4000".
      - "127.0.0.1:4000:4000"
    env_file:
      # Same env file `npm run dev` uses. Required keys:
      #   MONGO_URI, SESSION_SECRET, INTEGRATION_TOKEN_KEY
      # Plus integration secrets (RESEND_API_KEY, MISTRAL_API_KEY)
      # and per-engagement keys (<ENGAGEMENT>_GITHUB_CLIENT_ID, …).
      - apps/api/.env.local
    environment:
      NODE_ENV: production
      # If MONGO_URI in .env.local points at "mongodb://localhost",
      # rewrite it to the compose service name `mongo` so the api
      # container can resolve it. The env_file load wins on conflict,
      # so set MONGO_URI=mongodb://mongo:27017/devhub-dev in
      # .env.local if you want the local-mongo path.
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://espace-hubs.vercel.app,http://localhost:3000}
    extra_hosts:
      # `host.docker.internal` is the standard gateway-style hostname
      # that lets the container reach the Docker host. Always
      # available; harmless when unused.
      - "host.docker.internal:host-gateway"
      # Corporate hosts whose DNS only resolves via a VPN's internal
      # resolver. The container's bridge network can't reach the
      # corporate DNS (10.x.x.x) so `git.bcn.crealogix.net` fails to
      # resolve with ENOTFOUND even though the host (on VPN) resolves
      # it fine. Map the hostname directly to bypass DNS — the IP is
      # stable for the life of the engagement (corporate internal
      # infra doesn't load-balance), so a one-time mapping holds.
      #
      # Find the IP on the host:
      #   ping git.bcn.crealogix.net   # output starts with the IP
      #
      # Then uncomment the matching line below and replace the IP.
      # Symptom that means you need this: the dashboard surfaces
      # `integration_unreachable: Network error reaching gitlab:
      # fetch failed (ENOTFOUND)` while a `curl` from the host
      # succeeds.
      #
      # - "git.bcn.crealogix.net:192.168.104.31"
      # - "jira.bcn.crealogix.net:10.x.x.x"
      # - "jenkins.bcn.crealogix.net:10.x.x.x"
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    # Uncomment if your host's VPN client (e.g. corporate Cisco /
    # GlobalProtect) doesn't share routes with Docker's bridge —
    # network_mode: host bypasses Docker networking and uses the
    # host's interfaces directly so VPN routes apply. Most VPNs only
    # need the extra_hosts mapping above; flip to host networking
    # only when the container can resolve but can't reach the IP.
    # network_mode: "host"

  tunnel:
    # Optional Cloudflare Tunnel sidecar. Activate with --profile tunnel.
    # Use case: expose the api on a public hostname so the Vercel
    # frontend can call it. No inbound firewall changes needed; the
    # tunnel opens an OUTBOUND persistent connection to Cloudflare's
    # edge, which then routes external requests through to the api.
    #
    # First-time bootstrap (one-off, on your machine):
    #   cloudflared tunnel login                                   # opens browser, sign in to CF
    #   cloudflared tunnel create dev-espace-hub                   # creates the tunnel
    #   cloudflared tunnel token dev-espace-hub                    # copy the token
    #
    # Then in a sibling `.env` file (NOT apps/api/.env.local):
    #   TUNNEL_TOKEN=eyJhIjoi…
    #
    # Then in CF dashboard → Zero Trust → Networks → Tunnels →
    # your tunnel → Public Hostname, point it at http://api:4000
    # (Docker's service-name DNS resolves `api` to this container).
    #
    # Finally, set `API_ORIGIN=https://<your-public-hostname>` on
    # Vercel + redeploy.
    container_name: espace-devhub-api-tunnel
    profiles: ["tunnel"]
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      # Default to empty so the compose file parses cleanly when the
      # tunnel sidecar isn't activated. docker-compose interpolates
      # EVERY service's env vars on load, even profile-gated ones —
      # `${...:?error}` would block `docker compose up -d` (no tunnel
      # profile) on users without TUNNEL_TOKEN set.
      #
      # The companion's auto-spawn cloudflared on the HOST (not in this
      # sidecar) is the default path; this sidecar is only relevant
      # for users running a named tunnel via `docker compose --profile
      # tunnel up -d` directly. Those users set TUNNEL_TOKEN themselves;
      # the sidecar would crash on launch with an empty value, which
      # is the correct failure mode for the named-tunnel use case.
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:-}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  redis:
    # Reserved for cross-process rate limits + background queues (M4+).
    # Profile-gated so `docker compose up -d` doesn't spin it up by
    # default — no code consumes it yet.
    profiles: ["future"]
    image: redis:7-alpine
    container_name: devhub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  jenkins:
    # QA Hub data source — automation test runs, build pass/fail,
    # flake rate. Profile-gated because most devs don't need it; only
    # spin it up when actively developing QA-side widgets.
    #
    # First-time bootstrap:
    #   docker compose --profile qa up -d
    #   docker compose --profile qa logs -f jenkins   # find the initial admin password
    #   open http://localhost:8080 → finish setup wizard → create API token
    #   paste {url, username, apiToken} into the QA Hub Settings → Integrations
    profiles: ["qa"]
    image: jenkins/jenkins:lts-jdk17
    container_name: devhub-jenkins
    restart: unless-stopped
    user: root
    ports:
      - "8080:8080"   # web UI + REST API
      - "50000:50000" # agent connection (unused in dev — kept for completeness)
    volumes:
      - jenkins-data:/var/jenkins_home
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/login >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  mongo-data:
  redis-data:
  jenkins-data:
